name: Airtable Unit Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # allows saving units_state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Playwright + HTML parser)
        run: |
          pip install --upgrade pip
          pip install playwright requests beautifulsoup4
          playwright install --with-deps chromium

      - name: Run monitor
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FORM_URL: ${{ secrets.FORM_URL }}
        run: |
          python monitor_units.py

      - name: Commit state file if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add units_state.json pronto_state.json
            git commit -m "Update unit state"
            git push
          else
            echo "No changes to commit."
          fi
