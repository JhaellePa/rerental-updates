name: Airtable Unit Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 1 minute (use */5 for every 5 minutes)
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Playwright + HTML parser)
        run: |
          pip install --upgrade pip
          pip install playwright requests beautifulsoup4
          playwright install --with-deps chromium

      - name: Run monitor
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FORM_URL: ${{ secrets.FORM_URL }}
          PRONTO_URL: ${{ secrets.PRONTO_URL }}  # optional if you add it
        run: |
          python monitor_units.py

      - name: Commit state file if changed
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"

            [ -f units_state.json ] && git add units_state.json
            [ -f pronto_state.json ] && git add pronto_state.json

            if git diff --cached --quiet; then
              echo "Nothing staged to commit."
              exit 0
            fi

            git commit -m "Update unit state"
            git push
          else
            echo "No changes to commit."
          fi
